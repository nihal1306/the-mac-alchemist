name: Sync Medium Posts & Deploy

on:
  schedule:
    - cron: '0 7 * * *'
  push:
    branches: [main]
    paths:
      - 'apps.json'
      - 'featured.json'
      - 'template.html'
      - 'icon_cache.json'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build site
        run: python3 build.py

      - name: Commit updated files (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html icon_cache.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update: sync Medium posts & icons [$(date -u '+%Y-%m-%d')]"
            git push
          fi
