name: Sync Medium Posts & Deploy

on:
  schedule:
    - cron: '0 7 * * *'
  push:
    branches: [main]
    paths:
      - 'apps.json'
      - 'featured.json'
      - 'template.html'
      - 'icon_cache.json'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build site
        run: python3 build.py

      - name: Save icon cache to repo
        continue-on-error: true
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add icon_cache.json
          git diff --staged --quiet || git commit -m "Update icon cache [$(date -u '+%Y-%m-%d')]"
          git push || echo "Push skipped"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: the-mac-alchemist-website
          directory: .
